{% extends 'base.html' %}

{% block content %}

    <h2>Delete {{ driver }}</h2>
    
    <p>Are you sure you want to delete this driver?</p>
    
    <form method="post">
    
        {% csrf_token %}
        
        <button class="btn btn-danger">Confirm Delete</button>
        
        <a href="{% url 'driver-details' driver.id %}" class="btn btn-secondary">
        Cancel
        </a>
    
    </form>

{% endblock %}
