{% extends 'base.html' %}

{% block content %}

    <h1>Drivers</h1>
    
    <a href="{% url 'driver-create' %}" class="btn btn-primary">Add Driver</a>
    
    <ul>
        {% for driver in drivers %}
            <li>
                <a href="{% url 'driver-details' driver.id %}">
                {{ driver.first_name }} {{ driver.last_name }}
                </a>
            </li>
        {% endfor %}
    </ul>

{% endblock %}
